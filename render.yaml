# Render blueprint — connect this repo to Render and pick "Use blueprint".
# https://render.com/docs/infrastructure-as-code
services:
  - type: web
    name: rok-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm ci && npm run build
    # `prisma db push` syncs the schema to the connected Postgres on every deploy.
    # `tsx prisma/seed.ts` upserts the requirements/media defaults (idempotent).
    startCommand: npx prisma db push --skip-generate && npx tsx prisma/seed.ts && node dist/index.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # set this manually in the Render dashboard from your Neon URL
      - key: ADMIN_TOKEN
        generateValue: true   # Render generates a random token on first deploy
      - key: CORS_ORIGINS
        sync: false   # comma-separated list of your Vercel URLs (landing + admin)
      - key: PORT
        value: 4000
